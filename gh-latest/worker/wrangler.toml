name = "brainforge-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "brainforge-db"
database_id = "3814a86b-7054-465c-ae64-8bf99019cf6b"

# Daily D1 backup at 2:00 AM UTC
[triggers]
crons = ["0 2 * * *"]

# Required secrets (set via: wrangler secret put GITHUB_TOKEN)
# GITHUB_TOKEN = your GitHub fine-grained token
# GITHUB_REPO       = richardbrownmiami-commits/caffeine-brainforge
# TELEGRAM_BOT_TOKEN = your Telegram bot token (optional, fallback for agent notifications)
# TELEGRAM_CHAT_ID   = your Telegram chat ID (optional, fallback for agent notifications)
