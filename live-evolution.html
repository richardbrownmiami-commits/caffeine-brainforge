<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainforge — Evolution Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent2); flex: 1; }
    nav a { color: var(--text2); text-decoration: none; font-size: 0.875rem; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
    nav a:hover, nav a.active { background: var(--bg3); color: var(--accent2); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-live { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge-live::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .trigger-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); color: var(--text); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-msg { font-size: 0.875rem; color: var(--text3); }
    .dim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .dim-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.3s; }
    .dim-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .dim-card.active { border-color: rgba(108,99,255,0.5); background: rgba(108,99,255,0.05); }
    .dim-card.needs_work { border-color: rgba(234,179,8,0.4); }
    .dim-card.complete { border-color: rgba(34,197,94,0.5); }
    .dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dim-name { font-weight: 600; font-size: 1rem; }
    .dim-status { font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; }
    .status-active { background: rgba(108,99,255,0.2); color: var(--accent2); }
    .status-needs_work { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .status-complete { background: rgba(34,197,94,0.15); color: var(--green); }
    .dim-score { font-size: 2rem; font-weight: 700; color: var(--accent2); margin: 8px 0; }
    .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 1s ease; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .dim-meta { font-size: 0.75rem; color: var(--text3); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .dim-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .section-title { font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-bottom: 16px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .conflict-item { background: var(--bg3); border: 1px solid rgba(234,179,8,0.3); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .conflict-key { font-size: 0.75rem; color: var(--yellow); font-family: monospace; font-weight: 600; }
    .conflict-existing { font-size: 0.8rem; color: var(--text2); margin-top: 6px; }
    .conflict-new { font-size: 0.8rem; color: var(--accent2); margin-top: 4px; }
    .conflict-actions { display: flex; gap: 8px; margin-top: 10px; }
    .event-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .event-item:last-child { border-bottom: none; }
    .event-time { color: var(--text3); min-width: 80px; font-family: monospace; }
    .event-type { padding: 2px 6px; border-radius: 4px; background: rgba(108,99,255,0.15); color: var(--accent2); font-size: 0.7rem; font-weight: 600; min-width: 80px; text-align: center; }
    .event-msg { color: var(--text2); flex: 1; }
    .loading { color: var(--text3); font-size: 0.875rem; padding: 20px; text-align: center; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 0.875rem; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">🧠 Brainforge</div>
    <a href="index.html">Dashboard</a>
    <a href="live-knowledge.html">Knowledge</a>
    <a href="live-evolution.html" class="active">Evolution</a>
    <a href="live-log.html">Live Log</a>
        <a href="live-suggestions.html">Suggestions</a>
    </nav>
  <div class="container">
    <div class="header">
      <h1>🧬 Evolution Dashboard</h1>
      <span class="badge badge-live">LIVE</span>
    </div>

    <div class="trigger-bar">
      <button class="btn btn-primary" id="triggerBtn" onclick="triggerEvolution()">⚡ Trigger Evolution Cycle</button>
      <button class="btn btn-secondary" onclick="refreshAll()">↻ Refresh</button>
      <span class="status-msg" id="statusMsg">Auto-refreshes every 30s</span>
    </div>

    <div class="dim-grid" id="dimGrid">
      <div class="loading">Loading dimensions...</div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="section-title">⚠️ Conflicts Pending Review</div>
        <div id="conflictList"><div class="loading">Loading conflicts...</div></div>
      </div>
      <div class="card">
        <div class="section-title">📜 Recent Evolution Events</div>
        <div id="evolutionLog" style="max-height:400px;overflow-y:auto"><div class="loading">Loading events...</div></div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const WORKER = 'https://caffeine-brain-worker.richard-brown-miami.workers.dev';
    let autoRefreshTimer;

    const DIMENSIONS = [
      { id: 'auto_improvement', label: 'Auto Improvement', icon: '🔄', key: 'dim_auto_improvement' },
      { id: 'skill_acquisition', label: 'Skill Acquisition', icon: '📚', key: 'dim_skill_acquisition' },
      { id: 'identity_development', label: 'Identity Development', icon: '🪪', key: 'dim_identity_development' },
      { id: 'thinking_improvement', label: 'Thinking Improvement', icon: '💭', key: 'dim_thinking_improvement' },
      { id: 'feature_addition', label: 'Feature Addition', icon: '🔧', key: 'dim_feature_addition' },
      { id: 'tool_integration', label: 'Tool Integration', icon: '🛠️', key: 'dim_tool_integration' }
    ];

    async function loadDimensions() {
      const grid = document.getElementById('dimGrid');
      try {
        const fetches = DIMENSIONS.map(d =>
          fetch(`${WORKER}/memory?key=${d.key}`).then(r => r.json()).then(data => ({ ...d, data }))
        );
        const results = await Promise.all(fetches);
        grid.innerHTML = results.map(dim => {
          const v = dim.data.found ? dim.data.value : null;
          const status = v ? (v.status || 'needs_work') : 'needs_work';
          const cycles = v ? (v.cycle_count || v.cycles || 0) : 0;
          const score = v ? (v.score || v.progress || (cycles > 0 ? Math.min(95, cycles * 15) : 5)) : 5;
          const lastActivity = v ? (v.last_activity || v.updated_at || null) : null;
          return `
            <div class="dim-card ${status}">
              <div class="dim-icon">${dim.icon}</div>
              <div class="dim-header">
                <span class="dim-name">${dim.label}</span>
                <span class="dim-status status-${status}">${status.replace('_',' ')}</span>
              </div>
              <div class="dim-score">${score}%</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${score}%"></div></div>
              <div class="dim-meta">
                <span>Cycles: ${cycles}</span>
                <span>${lastActivity ? new Date(lastActivity).toLocaleDateString() : 'No activity'}</span>
              </div>
            </div>`;
        }).join('');
      } catch(e) {
        grid.innerHTML = '<div class="loading" style="color:var(--red)">Error loading dimensions</div>';
      }
    }

    async function loadConflicts() {
      const list = document.getElementById('conflictList');
      try {
        const r = await fetch(`${WORKER}/conflicts`);
        const d = await r.json();
        const conflicts = d.conflicts || [];
        if (!conflicts.length) {
          list.innerHTML = '<div class="loading" style="color:var(--green)">✅ No conflicts — brain is consistent</div>';
          return;
        }
        list.innerHTML = conflicts.map((c, i) => `
          <div class="conflict-item" id="conflict-${i}">
            <div class="conflict-key">⚡ ${escHtml(c.key || 'unknown_key')}</div>
            <div class="conflict-existing"><strong>Existing:</strong> ${escHtml(String(c.existing || c.old_value || '').slice(0, 150))}</div>
            <div class="conflict-new"><strong>New:</strong> ${escHtml(String(c.new_value || c.proposed || '').slice(0, 150))}</div>
            <div class="conflict-actions">
              <button class="btn btn-success" style="padding:6px 12px;font-size:0.75rem" onclick="resolveConflict(${i}, '${escHtml(c.key||'')}', 'approve')">✓ Approve New</button>
              <button class="btn btn-danger" style="padding:6px 12px;font-size:0.75rem" onclick="resolveConflict(${i}, '${escHtml(c.key||'')}', 'reject')">✗ Keep Existing</button>
            </div>
          </div>`).join('');
      } catch(e) {
        list.innerHTML = '<div class="loading" style="color:var(--red)">Error loading conflicts</div>';
      }
    }

    async function resolveConflict(idx, key, action) {
      try {
        const r = await fetch(`${WORKER}/conflicts`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ key, action })
        });
        const d = await r.json();
        if (d.success || r.ok) {
          document.getElementById(`conflict-${idx}`)?.remove();
          showToast(`Conflict ${action}d ✓`, 'success');
        } else {
          showToast('Failed: ' + (d.error||'unknown'), 'error');
        }
      } catch(e) { showToast('Error: '+e.message, 'error'); }
    }

    async function loadEvolutionLog() {
      const log = document.getElementById('evolutionLog');
      try {
        const r = await fetch(`${WORKER}/events`);
        const d = await r.json();
        const events = (d.events || []).filter(e => 
          e.type === 'evolution' || e.type === 'evolve' || e.event_type === 'evolution' ||
          String(e.message||e.action||'').toLowerCase().includes('evol')
        ).slice(-10).reverse();
        if (!events.length) {
          log.innerHTML = '<div class="loading">No evolution events yet</div>';
          return;
        }
        log.innerHTML = events.map(e => `
          <div class="event-item">
            <span class="event-time">${new Date(e.timestamp||e.created_at).toLocaleTimeString()}</span>
            <span class="event-type">${escHtml(e.type||e.event_type||'event')}</span>
            <span class="event-msg">${escHtml((e.message||e.action||e.data||'').toString().slice(0,120))}</span>
          </div>`).join('');
      } catch(e) {
        log.innerHTML = '<div class="loading" style="color:var(--red)">Error loading events</div>';
      }
    }

    async function triggerEvolution() {
      const btn = document.getElementById('triggerBtn');
      const msg = document.getElementById('statusMsg');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinning">⟳</span> Running...';
      msg.textContent = 'Evolution cycle running...';
      try {
        const r = await fetch(`${WORKER}/evolve`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
        const d = await r.json();
        if (r.ok) {
          showToast('Evolution cycle complete! 🧬', 'success');
          msg.textContent = 'Cycle complete — ' + new Date().toLocaleTimeString();
          await refreshAll();
        } else {
          showToast('Evolution failed: ' + (d.error||'unknown'), 'error');
          msg.textContent = 'Error — check /evolve endpoint';
        }
      } catch(e) {
        showToast('Error: '+e.message, 'error');
        msg.textContent = 'Network error';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '⚡ Trigger Evolution Cycle';
      }
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    async function refreshAll() {
      await Promise.all([loadDimensions(), loadConflicts(), loadEvolutionLog()]);
    }

    function startAutoRefresh() {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(refreshAll, 30000);
    }

    refreshAll();
    startAutoRefresh();
  </script>
</body>
</html>
