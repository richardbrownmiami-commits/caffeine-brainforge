<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainforge AI — Live Activity Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --green: #00ff88;
    --cyan: #00ffff;
    --yellow: #ffcc00;
    --red: #ff4444;
    --purple: #bb86fc;
    --grey: #888888;
    --text: #e0e0e0;
    --font: "Consolas", "Courier New", monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    background: #050505;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand { color: var(--green); font-size: 15px; font-weight: bold; letter-spacing: 1px; white-space: nowrap; }
  .live-badge {
    background: rgba(0,255,136,0.12);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }
  .nav-links { display: flex; gap: 12px; flex-wrap: wrap; margin-left: auto; }
  .nav-links a {
    color: var(--grey);
    text-decoration: none;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--text); background: var(--bg3); }
  .nav-links a.active { color: var(--green); border-bottom: 1px solid var(--green); }
  main { flex: 1; padding: 16px 20px; max-width: 1400px; width: 100%; margin: 0 auto; }
  .controls {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(0,255,136,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { border-color: var(--cyan); color: var(--cyan); }
  .btn-secondary:hover { background: rgba(0,255,255,0.1); }
  .refresh-info { color: var(--grey); font-size: 11px; display: flex; flex-direction: column; gap: 2px; }
  .evolve-status { margin-left: auto; font-size: 11px; color: var(--grey); background: var(--bg3); padding: 4px 10px; border-radius: 4px; }
  #evolve-status-text { color: var(--yellow); }
  .section-title {
    color: var(--grey);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .dim-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .dim-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 155px;
    flex-shrink: 0;
    transition: border-color 0.3s;
  }
  .dim-card.active { border-color: var(--green); }
  .dim-card.evolving { border-color: var(--cyan); }
  .dim-card.needs_work { border-color: var(--yellow); }
  .dim-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .dim-emoji { font-size: 16px; }
  .dim-name { color: var(--text); font-size: 11px; line-height: 1.3; }
  .dim-badge { font-size: 9px; padding: 1px 6px; border-radius: 10px; margin-top: 4px; display: inline-block; }
  .dim-badge.active { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid var(--green); }
  .dim-badge.evolving { background: rgba(0,255,255,0.15); color: var(--cyan); border: 1px solid var(--cyan); }
  .dim-badge.needs_work { background: rgba(255,204,0,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
  .dim-cycles { font-size: 10px; color: var(--grey); margin-top: 4px; }
  .panels-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; align-items: start; }
  @media (max-width: 900px) { .panels-grid { grid-template-columns: 1fr; } }
  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--bg3);
  }
  .panel-title { font-size: 12px; color: var(--cyan); font-weight: bold; letter-spacing: 1px; flex-shrink: 0; }
  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    width: 180px;
    outline: none;
  }
  .search-input:focus { border-color: var(--cyan); }
  .type-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    outline: none;
  }
  .event-count { margin-left: auto; font-size: 11px; color: var(--grey); }
  .events-body {
    min-height: 420px;
    max-height: 520px;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .event-row {
    padding: 4px 8px;
    border-radius: 3px;
    margin-bottom: 2px;
    font-size: 12px;
    line-height: 1.5;
    border-left: 2px solid transparent;
    word-break: break-all;
    transition: background 0.15s;
  }
  .event-row:hover { background: rgba(255,255,255,0.03); }
  .event-row.evolve { color: var(--purple); border-left-color: var(--purple); }
  .event-row.chat { color: var(--cyan); border-left-color: var(--cyan); }
  .event-row.memory { color: var(--green); border-left-color: var(--green); }
  .event-row.search { color: var(--yellow); border-left-color: var(--yellow); }
  .event-row.error { color: var(--red); border-left-color: var(--red); }
  .event-row.system { color: var(--grey); border-left-color: var(--grey); }
  .empty-state { text-align: center; color: var(--grey); padding: 60px 20px; font-size: 13px; }
  .conflicts-body {
    padding: 10px;
    max-height: 320px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .conflict-card {
    background: rgba(255,68,68,0.06);
    border: 1px solid rgba(255,68,68,0.25);
    border-radius: 5px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .conflict-key { color: var(--red); font-size: 12px; font-weight: bold; margin-bottom: 6px; }
  .conflict-row { display: grid; grid-template-columns: 60px 1fr; gap: 4px; font-size: 11px; margin-bottom: 2px; }
  .conflict-label { color: var(--grey); }
  .conflict-val { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conflict-meta { margin-top: 6px; font-size: 10px; color: var(--grey); display: flex; gap: 10px; }
  .no-conflicts { text-align: center; color: var(--green); padding: 30px 20px; font-size: 13px; }
  footer {
    background: #050505;
    border-top: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--grey);
  }
  .health-item span { color: var(--text); }
  .health-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 5px; }
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--cyan));
    width: 0%;
    transition: width 0.4s;
    position: fixed;
    top: 0; left: 0;
    z-index: 999;
  }
  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<nav>
  <span class="nav-brand">&#x2B21; Brainforge AI</span>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="live-knowledge.html">Knowledge</a>
    <a href="live-evolution.html">Evolution</a>
    <a href="live-log.html" class="active">Live Log</a>
  </div>
</nav>
<main>
  <div class="controls">
    <button class="btn" id="btn-evolve" onclick="triggerEvolve()">&#x26A1; Trigger Evolution</button>
    <button class="btn btn-secondary" onclick="refreshAll()">&#x21BA; Refresh Now</button>
    <div class="refresh-info">
      <span>&#x1F550; Last refreshed: <span id="last-refresh">&mdash;</span></span>
      <span>&#x23F1; Next refresh: <span id="next-refresh">10</span>s</span>
    </div>
    <div class="evolve-status">Status: <span id="evolve-status-text">idle</span></div>
  </div>
  <div class="section-title">Self-Evolution Dimensions</div>
  <div class="dim-row" id="dim-row">
    <div class="dim-card needs_work"><div class="dim-header"><span class="dim-emoji">&#x1F527;</span><span class="dim-name">Loading&hellip;</span></div><span class="dim-badge needs_work">wait</span><div class="dim-cycles">0 cycles</div></div>
  </div>
  <div class="panels-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">&#x2588; EVENTS TIMELINE</span>
        <input class="search-input" id="search-input" type="text" placeholder="Search events&hellip;" oninput="filterEvents()">
        <select class="type-select" id="type-filter" onchange="filterEvents()">
          <option value="all">All Types</option>
          <option value="evolve">evolve</option>
          <option value="chat">chat</option>
          <option value="memory">memory</option>
          <option value="search">search</option>
          <option value="error">error</option>
          <option value="system">system</option>
        </select>
        <span class="event-count" id="event-count">0 events</span>
      </div>
      <div class="events-body" id="events-body">
        <div class="empty-state"><span class="spinner"></span>Loading events&hellip;</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">&#x26A0; CONFLICTS</span>
          <span style="font-size:11px;color:var(--grey);margin-left:auto;">Read-only</span>
          <span id="conflict-count" style="font-size:11px;background:rgba(255,68,68,0.15);color:var(--red);padding:1px 7px;border-radius:10px;border:1px solid rgba(255,68,68,0.3);">0</span>
        </div>
        <div class="conflicts-body" id="conflicts-body">
          <div class="no-conflicts"><span class="spinner"></span>Checking&hellip;</div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer id="health-footer">
  <span><span class="health-dot"></span>Cloudflare Worker</span>
  <span class="health-item">Version: <span id="h-version">&mdash;</span></span>
  <span class="health-item">D1: <span id="h-d1">&mdash;</span></span>
  <span class="health-item">Endpoints: <span id="h-endpoints">&mdash;</span></span>
  <span class="health-item" style="margin-left:auto;">Updated: <span id="h-updated">&mdash;</span></span>
</footer>
<script>
const WORKER="https://caffeine-brain-worker.richard-brown-miami.workers.dev";
const DIM_META={auto_improvement:{emoji:"🔧",label:"Auto Improvement"},skill_acquisition:{emoji:"📚",label:"Skill Acquisition"},identity_development:{emoji:"🧬",label:"Identity Dev"},thinking_improvement:{emoji:"🧠",label:"Thinking"},feature_addition:{emoji:"⚡",label:"Feature Addition"},tool_integration:{emoji:"🔗",label:"Tool Integration"}};
let allEvents=[],refreshTimer=10,countdownInterval=null,isEvolving=false;
function fmt(ts){if(!ts)return"??:??:??";try{return new Date(ts).toLocaleTimeString("en-US",{hour12:false})}catch{return String(ts).slice(0,8)}}
function truncate(s,n){s=String(s||"");return s.length>n?s.slice(0,n)+"…":s}
function setLoading(pct){const b=document.getElementById("loading-bar");b.style.width=pct+"%";if(pct>=100)setTimeout(()=>{b.style.width="0%"},500)}
async function loadDimensions(){try{const r=await fetch(WORKER+"/evolve/status"),data=await r.json(),dims=data.dimensions||data||{},row=document.getElementById("dim-row"),keys=Object.keys(DIM_META);row.innerHTML=keys.map(k=>{const d=dims[k]||{},status=d.status||"needs_work",cycles=d.tasks_completed||d.cycles||0,m=DIM_META[k];return'<div class="dim-card '+status+'"><div class="dim-header"><span class="dim-emoji">'+m.emoji+'</span><span class="dim-name">'+m.label+'</span></div><span class="dim-badge '+status+'">'+status.replace("_"," ")+"</span><div class="dim-cycles">"+(cycles||0)+" cycle"+(cycles!==1?"s":"")+"</div></div>"}).join("");}catch(e){document.getElementById("dim-row").innerHTML='<div style="color:var(--red);padding:10px;">Failed to load dimensions</div>'}}
async function loadEvents(){try{const r=await fetch(WORKER+"/events"),data=await r.json();allEvents=(data.events||data||[]).slice().reverse().slice(0,50);filterEvents()}catch(e){document.getElementById("events-body").innerHTML='<div class="empty-state" style="color:var(--red);">&#x26A0; Failed to load events</div>'}}
function getEventType(ev){const t=(ev.type||ev.event_type||ev.action||"system").toLowerCase();if(t.includes("evolve"))return"evolve";if(t.includes("chat"))return"chat";if(t.includes("memory")||t.includes("mem"))return"memory";if(t.includes("search"))return"search";if(t.includes("error")||t.includes("fail"))return"error";return"system"}
function filterEvents(){const q=(document.getElementById("search-input").value||"").toLowerCase(),tf=document.getElementById("type-filter").value,filtered=allEvents.filter(ev=>{const et=getEventType(ev);if(tf!=="all"&&et!==tf)return false;if(q&&!JSON.stringify(ev).toLowerCase().includes(q))return false;return true});document.getElementById("event-count").textContent=filtered.length+" event"+(filtered.length!==1?"s":"");if(!filtered.length){document.getElementById("events-body").innerHTML='<div class="empty-state">[ No events found ]</div>';return}document.getElementById("events-body").innerHTML=filtered.map(ev=>{const et=getEventType(ev),ts=fmt(ev.timestamp||ev.created_at||ev.time),agent=ev.agent||ev.source||"system",action=ev.action||ev.type||ev.event_type||"event",det=ev.details||ev.message||ev.data||ev.content||"",ds=typeof det==="object"?JSON.stringify(det):String(det);return'<div class="event-row '+et+'">['+ts+'] '+et.toUpperCase().padEnd(7," ")+' | '+agent+' → '+action+': '+truncate(ds,120)+"</div>"}).join("")}
async function loadConflicts(){try{const r=await fetch(WORKER+"/conflicts"),data=await r.json(),conflicts=data.conflicts||data||[];document.getElementById("conflict-count").textContent=conflicts.length;if(!conflicts.length){document.getElementById("conflicts-body").innerHTML='<div class="no-conflicts">&#x2713; No conflicts detected</div>';return}document.getElementById("conflicts-body").innerHTML=conflicts.map(c=>{const key=c.key||c.dimension||"unknown",ov=truncate(c.old_value||c.existing||"",60),nv=truncate(c.new_value||c.proposed||"",60),conf=c.confidence?Math.round(c.confidence*100)+"%":"—",ts=fmt(c.timestamp||c.created_at);return'<div class="conflict-card"><div class="conflict-key">&#x2691; '+key+'</div><div class="conflict-row"><span class="conflict-label">Old:</span><span class="conflict-val">'+ov+"</span></div><div class="conflict-row"><span class="conflict-label">New:</span><span class="conflict-val">"+(nv||"—")+"</span></div><div class="conflict-meta"><span>Confidence: "+conf+"</span><span>"+ts+"</span></div></div>"}).join("")}catch(e){document.getElementById("conflicts-body").innerHTML='<div class="no-conflicts" style="color:var(--red);">&#x26A0; Failed to load</div>'}}
async function loadHealth(){try{const r=await fetch(WORKER+"/health"),data=await r.json();document.getElementById("h-version").textContent=data.version||"—";document.getElementById("h-d1").textContent=data.d1||data.database||"—";const eps=data.endpoints?(Array.isArray(data.endpoints)?data.endpoints.length:Object.keys(data.endpoints).length):"—";document.getElementById("h-endpoints").textContent=eps;document.getElementById("h-updated").textContent=fmt(data.timestamp||data.updated_at||new Date().toISOString())}catch(e){document.getElementById("h-version").textContent="err"}}
async function triggerEvolve(){if(isEvolving)return;isEvolving=true;const btn=document.getElementById("btn-evolve");btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Evolving…';document.getElementById("evolve-status-text").textContent="running…";try{const r=await fetch(WORKER+"/evolve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({trigger:"manual"})}),data=await r.json();document.getElementById("evolve-status-text").textContent="cycle "+(data.cycle||"done");await refreshAll()}catch(e){document.getElementById("evolve-status-text").textContent="error"}finally{isEvolving=false;btn.disabled=false;btn.innerHTML="&#x26A1; Trigger Evolution"}}
async function refreshAll(){setLoading(20);document.getElementById("last-refresh").textContent="refreshing…";await Promise.all([loadDimensions(),loadEvents(),loadConflicts(),loadHealth()]);setLoading(100);document.getElementById("last-refresh").textContent=new Date().toLocaleTimeString();resetCountdown()}
function resetCountdown(){refreshTimer=10;document.getElementById("next-refresh").textContent=refreshTimer;clearInterval(countdownInterval);countdownInterval=setInterval(()=>{refreshTimer--;document.getElementById("next-refresh").textContent=refreshTimer;if(refreshTimer<=0)refreshAll()},1000)}
window.addEventListener("DOMContentLoaded",async()=>{await refreshAll();triggerEvolve()});
</script>
</body>
</html>
