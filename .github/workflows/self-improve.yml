name: Self-Improve Brain

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  evolve-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run evolution cycle
        run: |
          RESULT=$(curl -s -X POST https://caffeine-brain-worker.richard-brown-miami.workers.dev/evolve)
          echo "Cycle result: $(echo $RESULT | head -c 200)"
          mkdir -p canonical
          echo "" >> canonical/evolution-log.md
          echo "## $(date -u '+%Y-%m-%d %H:%M UTC')" >> canonical/evolution-log.md
          echo '```json' >> canonical/evolution-log.md
          echo "$RESULT" | head -c 500 >> canonical/evolution-log.md
          echo '```' >> canonical/evolution-log.md
      - name: Commit log
        run: |
          git config user.name "Brainforge AI"
          git config user.email "ai@brainforge.ai"
          git add canonical/evolution-log.md
          git diff --staged --quiet || git commit -m "auto: evolution $(date -u +%Y-%m-%d)"
          git push

  evolve-quick:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Dimension status check
        run: |
          STATUS=$(curl -s https://caffeine-brain-worker.richard-brown-miami.workers.dev/evolve)
          echo "Dimensions: $STATUS" | head -c 400
      - name: Trigger evolution cycle
        run: |
          RESULT=$(curl -s -X POST https://caffeine-brain-worker.richard-brown-miami.workers.dev/evolve)
          echo "Evolution: $(echo $RESULT | head -c 300)"
