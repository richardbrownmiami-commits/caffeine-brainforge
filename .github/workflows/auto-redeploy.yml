name: Auto-Redeploy Worker on Brain/Rules Change

on:
  push:
    branches: [main, master]
    paths:
      - 'canonical/**'
      - 'rules/**'

jobs:
  redeploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch current Worker script
        id: fetch_script
        run: |
          curl -s -o worker_script.js \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/${{ secrets.CLOUDFLARE_WORKER_NAME }}"
          BYTES=$(wc -c < worker_script.js)
          echo "Worker script fetched: ${BYTES} bytes"
          if [ "$BYTES" -lt 100 ]; then
            echo "ERROR: Script too small, fetch may have failed"
            cat worker_script.js
            exit 1
          fi

      - name: Redeploy Worker with D1 binding preserved
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, sys

          boundary = 'FormBoundaryBrainAutoRedeploy'

          with open('worker_script.js', 'rb') as f:
              script_content = f.read()

          metadata = json.dumps({
              'main_module': 'worker_script.js',
              'bindings': [
                  {
                      'type': 'd1',
                      'name': 'DB',
                      'id': '65bde2c6-d7da-43dc-89bc-47b4b2eddb56'
                  }
              ],
              'compatibility_date': '2024-01-01'
          }).encode()

          body = (
              b'--' + boundary.encode() + b'\r\n' +
              b'Content-Disposition: form-data; name="metadata"\r\n' +
              b'Content-Type: application/json\r\n\r\n' +
              metadata + b'\r\n' +
              b'--' + boundary.encode() + b'\r\n' +
              b'Content-Disposition: form-data; name="worker_script.js"; filename="worker_script.js"\r\n' +
              b'Content-Type: application/javascript+module\r\n\r\n' +
              script_content + b'\r\n' +
              b'--' + boundary.encode() + b'--\r\n'
          )

          import os
          account_id = os.environ.get('CLOUDFLARE_ACCOUNT_ID', '')
          worker_name = os.environ.get('CLOUDFLARE_WORKER_NAME', '')
          api_token = os.environ.get('CLOUDFLARE_API_TOKEN', '')

          url = f'https://api.cloudflare.com/client/v4/accounts/{account_id}/workers/scripts/{worker_name}'
          req = urllib.request.Request(url, data=body, method='PUT')
          req.add_header('Authorization', f'Bearer {api_token}')
          req.add_header('Content-Type', f'multipart/form-data; boundary={boundary}')

          try:
              with urllib.request.urlopen(req) as response:
                  result = json.loads(response.read())
                  if result.get('success'):
                      print(f"SUCCESS: Worker redeployed - {result.get('result', {}).get('id', 'ok')}")
                  else:
                      print(f"FAILED: {result.get('errors', result)}")
                      sys.exit(1)
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"HTTP ERROR {e.code}: {error_body}")
              sys.exit(1)
          PYEOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}

      - name: Verify Worker health after redeploy
        run: |
          echo "Waiting 15 seconds for Worker to propagate..."
          sleep 15
          WORKER_NAME="${{ secrets.CLOUDFLARE_WORKER_NAME }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${WORKER_NAME}.richard-brown-miami.workers.dev/health")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Worker is healthy after redeploy!"
          else
            echo "Warning: health check returned $STATUS (may need more time)"
          fi
