name: Verify and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify (Syntax · Conflicts · Types)
    runs-on: ubuntu-latest
    outputs:
      verified: ${{ steps.result.outputs.verified }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      # ────────────────────────────────────────────────────────────
      # STAGE 1 — SYNTAX CHECK (biome)
      # ────────────────────────────────────────────────────────────
      - name: Stage 1 · Syntax check
        id: syntax
        working-directory: src/frontend
        run: |
          echo "::group::biome check"
          if ! npm run check; then
            echo "Syntax issues found — attempting auto-fix (attempt 1/2)…"
            npm run fix || true
            echo "Retrying biome check after fix…"
            npm run check
          fi
          echo "::endgroup::"

      # ────────────────────────────────────────────────────────────
      # STAGE 2 — STRUCTURAL CONFLICT DETECTION
      # ────────────────────────────────────────────────────────────
      - name: Stage 2 · Conflict detection
        id: conflicts
        run: |
          echo "::group::conflict scanner"
          node .github/scripts/check-conflicts.js
          echo "::endgroup::"

      # ────────────────────────────────────────────────────────────
      # STAGE 3 — DRY-RUN BUILD (TypeScript)
      # ────────────────────────────────────────────────────────────
      - name: Stage 3 · TypeScript dry-run (attempt 1)
        id: typecheck_1
        working-directory: src/frontend
        continue-on-error: true
        run: npm run typecheck

      - name: Stage 3 · Auto-fix on TS failure
        if: steps.typecheck_1.outcome == 'failure'
        working-directory: src/frontend
        run: |
          echo "TypeScript check failed — running biome fix and retrying (attempt 2/2)…"
          npm run fix || true

      - name: Stage 3 · TypeScript dry-run (attempt 2)
        id: typecheck_2
        if: steps.typecheck_1.outcome == 'failure'
        working-directory: src/frontend
        continue-on-error: true
        run: npm run typecheck

      # ────────────────────────────────────────────────────────────
      # STAGE 4 — AUTO-FIX LOOP: handle 2nd failure
      # ────────────────────────────────────────────────────────────
      - name: Stage 4 · Capture diff on 2nd failure
        if: |
          steps.typecheck_1.outcome == 'failure' &&
          steps.typecheck_2.outcome == 'failure'
        run: |
          echo "Both auto-fix attempts failed. Capturing diff…"
          git diff > verify-report.txt
          echo "" >> verify-report.txt
          echo "=== TypeScript errors ===" >> verify-report.txt
          cd src/frontend && npm run typecheck 2>&1 >> ../../verify-report.txt || true

      - name: Stage 4 · Upload verify-report artifact
        if: |
          steps.typecheck_1.outcome == 'failure' &&
          steps.typecheck_2.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: verify-report
          path: verify-report.txt
          retention-days: 7

      - name: Stage 4 · Fail after 2 attempts
        if: |
          steps.typecheck_1.outcome == 'failure' &&
          steps.typecheck_2.outcome == 'failure'
        run: |
          echo "::error::Verification failed after 2 auto-fix attempts."
          echo "::error::Download the verify-report.txt artifact and approve the push manually."
          exit 1

      - name: Set result output
        id: result
        run: echo "verified=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy (Worker · Pages)
    needs: verify
    if: needs.verify.outputs.verified == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      # ────────────────────────────────────────────────────────────
      # STAGE 5 — CONDITIONAL DEPLOY
      # ────────────────────────────────────────────────────────────

      # --- Deploy Worker ---
      - name: Stage 5 · Deploy Worker
        working-directory: gh-latest/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # --- Build frontend ---
      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      # --- Deploy Pages ---
      - name: Stage 5 · Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy src/frontend/dist \
            --project-name caffeine-brainforge \
            --commit-dirty=true
