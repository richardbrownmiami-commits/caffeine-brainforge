<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainforge — Knowledge Manager</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent2); flex: 1; }
    nav a { color: var(--text2); text-decoration: none; font-size: 0.875rem; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
    nav a:hover, nav a.active { background: var(--bg3); color: var(--accent2); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-live { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge-live::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat-card .label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent2); margin-top: 4px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid2 { grid-template-columns: 1fr; } }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-bar input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.875rem; outline: none; }
    .search-bar input:focus { border-color: var(--accent); }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-tab { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); transition: all 0.2s; }
    .filter-tab.active, .filter-tab:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .memory-list { display: flex; flex-direction: column; gap: 8px; max-height: 500px; overflow-y: auto; }
    .memory-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: border-color 0.2s; }
    .memory-item:hover { border-color: var(--accent); }
    .memory-item .key { font-size: 0.75rem; color: var(--accent); font-weight: 600; font-family: monospace; }
    .memory-item .val { font-size: 0.875rem; color: var(--text); margin-top: 4px; word-break: break-word; }
    .memory-item .meta { font-size: 0.7rem; color: var(--text3); margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 4px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.875rem; outline: none; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .agent-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .agent-card .name { font-weight: 600; color: var(--accent2); }
    .agent-card .role { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
    .agent-card .last { font-size: 0.7rem; color: var(--text3); margin-top: 6px; }
    .agent-list { display: flex; flex-direction: column; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-active { background: var(--green); }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 0.875rem; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .page-btn { padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); }
    .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .loading { color: var(--text3); font-size: 0.875rem; padding: 20px; text-align: center; }
    .refresh-info { font-size: 0.7rem; color: var(--text3); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">🧠 Brainforge</div>
    <a href="index.html">Dashboard</a>
    <a href="live-knowledge.html" class="active">Knowledge</a>
    <a href="live-evolution.html">Evolution</a>
    <a href="live-log.html">Live Log</a>
  </nav>
  <div class="container">
    <div class="header">
      <h1>📚 Knowledge Manager</h1>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="badge badge-live">LIVE</span>
        <span class="refresh-info" id="refreshInfo">Refreshes in 15s</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="label">Total Memories</div><div class="value" id="totalMemories">—</div></div>
      <div class="stat-card"><div class="label">Agents Active</div><div class="value" id="totalAgents">—</div></div>
      <div class="stat-card"><div class="label">Last Updated</div><div class="value" style="font-size:0.9rem" id="lastUpdated">—</div></div>
      <div class="stat-card"><div class="label">Knowledge Keys</div><div class="value" id="knowledgeKeys">—</div></div>
    </div>
    <div class="grid2">
      <div>
        <div class="card">
          <div class="card-title">🗃️ Memory Store</div>
          <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search memories..." oninput="filterMemories()">
            <button class="btn btn-secondary" onclick="loadMemories()">↻</button>
          </div>
          <div class="filter-tabs">
            <div class="filter-tab active" onclick="setFilter('all',this)">All</div>
            <div class="filter-tab" onclick="setFilter('knowledge',this)">Knowledge</div>
            <div class="filter-tab" onclick="setFilter('skill',this)">Skills</div>
            <div class="filter-tab" onclick="setFilter('dim_',this)">Dimensions</div>
            <div class="filter-tab" onclick="setFilter('hybrid',this)">Goals</div>
          </div>
          <div class="memory-list" id="memoryList"><div class="loading">Loading memories...</div></div>
          <div class="pagination" id="pagination"></div>
        </div>
        <div class="card" style="margin-top:20px">
          <div class="card-title">🔍 Fetch by Key</div>
          <div style="display:flex;gap:8px">
            <input type="text" id="fetchKeyInput" placeholder="Enter memory key..." style="flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.875rem;outline:none">
            <button class="btn btn-primary" onclick="fetchByKey()">Fetch</button>
          </div>
          <div id="fetchResult" style="margin-top:12px"></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">➕ Add Memory</div>
          <div class="form-group">
            <label>Key</label>
            <input type="text" id="newKey" placeholder="e.g. skill_python, knowledge_ai">
          </div>
          <div class="form-group">
            <label>Value</label>
            <textarea id="newValue" placeholder="Memory content..."></textarea>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="newType">
              <option value="knowledge">Knowledge</option>
              <option value="skill">Skill</option>
              <option value="learning">Learning</option>
              <option value="goal">Goal</option>
              <option value="fact">Fact</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addMemory()" style="width:100%">Save to Brain</button>
        </div>
        <div class="card" style="margin-top:20px">
          <div class="card-title">🤖 Agent Registry</div>
          <div class="agent-list" id="agentList"><div class="loading">Loading agents...</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const WORKER = 'https://caffeine-brain-worker.richard-brown-miami.workers.dev';
    let allMemories = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const PAGE_SIZE = 20;
    let countdown = 15;
    let countdownTimer;

    const KNOWN_KEYS = [
      'user_name','user_preferences','hybrid_goal','brain_version','system_identity',
      'skill_acquisition','identity_development','thinking_improvement','feature_addition','tool_integration','auto_improvement',
      'dim_auto_improvement','dim_skill_acquisition','dim_identity_development','dim_thinking_improvement','dim_feature_addition','dim_tool_integration',
      'groq_model','gemini_model','worker_version','last_evolution','evolution_cycles',
      'conflict_0','conflict_1','conflict_2','unverified_0','unverified_1',
      'knowledge_0','knowledge_1','knowledge_2','knowledge_3','knowledge_4',
      'learning_0','learning_1','learning_2'
    ];

    async function loadMemories() {
      try {
        const results = [];
        const batchSize = 5;
        for (let i = 0; i < KNOWN_KEYS.length; i += batchSize) {
          const batch = KNOWN_KEYS.slice(i, i + batchSize);
          const fetches = batch.map(k => 
            fetch(`${WORKER}/memory?key=${encodeURIComponent(k)}`)
              .then(r => r.json())
              .then(d => ({ key: k, value: d.value, found: d.found, updated_at: d.updated_at, access_count: d.access_count }))
              .catch(() => ({ key: k, value: null, found: false }))
          );
          const batchResults = await Promise.all(fetches);
          results.push(...batchResults.filter(r => r.found));
        }
        allMemories = results;
        document.getElementById('totalMemories').textContent = results.length;
        document.getElementById('knowledgeKeys').textContent = KNOWN_KEYS.length;
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
        renderMemories();
      } catch(e) {
        document.getElementById('memoryList').innerHTML = '<div class="loading" style="color:var(--red)">Error loading memories</div>';
      }
    }

    function filterMemories() {
      currentPage = 1;
      renderMemories();
    }

    function setFilter(f, el) {
      currentFilter = f;
      currentPage = 1;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderMemories();
    }

    function renderMemories() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allMemories.filter(m => {
        const matchFilter = currentFilter === 'all' || m.key.startsWith(currentFilter);
        const matchSearch = !search || m.key.toLowerCase().includes(search) || (m.value && String(m.value).toLowerCase().includes(search));
        return matchFilter && matchSearch;
      });
      const total = filtered.length;
      const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      const start = (currentPage - 1) * PAGE_SIZE;
      const page = filtered.slice(start, start + PAGE_SIZE);

      const list = document.getElementById('memoryList');
      if (!page.length) { list.innerHTML = '<div class="loading">No memories found</div>'; return; }
      list.innerHTML = page.map(m => `
        <div class="memory-item">
          <div class="key">🔑 ${escHtml(m.key)}</div>
          <div class="val">${escHtml(typeof m.value === 'object' ? JSON.stringify(m.value, null, 2) : String(m.value || ''))}</div>
          <div class="meta">
            ${m.access_count ? `<span>Accessed: ${m.access_count}x</span>` : ''}
            ${m.updated_at ? `<span>Updated: ${new Date(m.updated_at).toLocaleString()}</span>` : ''}
          </div>
        </div>`).join('');

      const pag = document.getElementById('pagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= pages; i++) html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
      pag.innerHTML = html;
    }

    function gotoPage(n) { currentPage = n; renderMemories(); }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function fetchByKey() {
      const key = document.getElementById('fetchKeyInput').value.trim();
      if (!key) return;
      try {
        const r = await fetch(`${WORKER}/memory?key=${encodeURIComponent(key)}`);
        const d = await r.json();
        const el = document.getElementById('fetchResult');
        if (d.found) {
          el.innerHTML = `<div class="memory-item"><div class="key">🔑 ${escHtml(key)}</div><div class="val">${escHtml(typeof d.value==='object'?JSON.stringify(d.value,null,2):String(d.value))}</div><div class="meta"><span>Access count: ${d.access_count||0}</span>${d.updated_at?`<span>Updated: ${new Date(d.updated_at).toLocaleString()}</span>`:''}</div></div>`;
        } else {
          el.innerHTML = `<div class="memory-item" style="border-color:var(--red)"><div class="val" style="color:var(--text3)">Key not found: ${escHtml(key)}</div></div>`;
        }
      } catch(e) { showToast('Fetch failed: '+e.message,'error'); }
    }

    async function addMemory() {
      const key = document.getElementById('newKey').value.trim();
      const value = document.getElementById('newValue').value.trim();
      const type = document.getElementById('newType').value;
      if (!key || !value) { showToast('Key and value required','error'); return; }
      try {
        const r = await fetch(`${WORKER}/memory`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({key, value, type})
        });
        const d = await r.json();
        if (d.success || r.ok) {
          showToast('Memory saved! 🧠','success');
          document.getElementById('newKey').value = '';
          document.getElementById('newValue').value = '';
          if (!KNOWN_KEYS.includes(key)) KNOWN_KEYS.push(key);
          await loadMemories();
        } else {
          showToast('Save failed: '+(d.error||'unknown'),'error');
        }
      } catch(e) { showToast('Error: '+e.message,'error'); }
    }

    async function loadAgents() {
      try {
        const r = await fetch(`${WORKER}/agents`);
        const d = await r.json();
        const agents = d.agents || [];
        document.getElementById('totalAgents').textContent = agents.length;
        const list = document.getElementById('agentList');
        if (!agents.length) { list.innerHTML = '<div class="loading">No agents found</div>'; return; }
        list.innerHTML = agents.map(a => `
          <div class="agent-card">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="status-dot status-active"></span>
              <span class="name">${escHtml(a.agent_id||a.name||'Unknown')}</span>
            </div>
            <div class="role">${escHtml(a.role||a.description||'Agent')}</div>
            <div class="last">Last: ${a.last_action ? new Date(a.last_action).toLocaleString() : 'Never'}</div>
          </div>`).join('');
      } catch(e) {
        document.getElementById('agentList').innerHTML = '<div class="loading" style="color:var(--red)">Error loading agents</div>';
      }
    }

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      countdown = 15;
      countdownTimer = setInterval(() => {
        countdown--;
        document.getElementById('refreshInfo').textContent = `Refreshes in ${countdown}s`;
        if (countdown <= 0) {
          countdown = 15;
          loadMemories();
          loadAgents();
        }
      }, 1000);
    }

    loadMemories();
    loadAgents();
    startCountdown();
  </script>
</body>
</html>
